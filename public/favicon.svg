<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <radialGradient id="lovelocked-light" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#4f46e5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="lovelocked-dark" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Light mode lovelocked -->
  <g class="light-lovelocked">
    <circle cx="20" cy="20" r="17" fill="url(#lovelocked-light)"/>
    <circle cx="20" cy="20" r="17" stroke="#4f46e5" stroke-width="1" opacity="0.4" fill="none"/>
    <ellipse cx="14" cy="13" rx="4.5" ry="3" fill="white" opacity="0.7" transform="rotate(-25 14 13)"/>
    <ellipse cx="24" cy="10" rx="1.5" ry="1" fill="white" opacity="0.5"/>
  </g>

  <!-- Dark mode lovelocked -->
  <g class="dark-lovelocked">
    <circle cx="20" cy="20" r="17" fill="url(#lovelocked-dark)"/>
    <circle cx="20" cy="20" r="17" stroke="#818cf8" stroke-width="1" opacity="0.4" fill="none"/>
    <ellipse cx="14" cy="13" rx="4.5" ry="3" fill="white" opacity="0.7" transform="rotate(-25 14 13)"/>
    <ellipse cx="24" cy="10" rx="1.5" ry="1" fill="white" opacity="0.5"/>
  </g>

  <style>
    .dark-lovelocked { display: none; }
    @media (prefers-color-scheme: dark) {
      .light-lovelocked { display: none; }
      .dark-lovelocked { display: block; }
    }
  </style>
</svg>
